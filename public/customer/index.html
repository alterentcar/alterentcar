<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Booking AlteRentCar</title><link rel="manifest" href="/manifest.json"><link rel="stylesheet" href="/css/customer.css"></head><body>
<header><h1>AlteRentCar</h1><p>Booking rental mobil online, cepat dan mudah.</p><a href="#booking">Booking Sekarang</a></header>
<section><h2>Armada</h2><div id="list" class="fleet"></div></section>
<section id="booking" class="box"><h2>Form Booking</h2><form id="form"><input name="nama" placeholder="Nama lengkap" required><input name="no_hp" placeholder="WhatsApp" required><input name="alamat" placeholder="Alamat"><input name="no_identitas" placeholder="No KTP/SIM"><input name="foto_ktp" type="file"><select name="armada_id" id="armada" required></select><label>Tanggal mulai</label><input name="tgl_mulai" id="mulai" type="date" required><label>Tanggal selesai</label><input name="tgl_selesai" id="selesai" type="date" required><select name="pakai_sopir" id="sopir"><option>Tidak</option><option>Ya</option></select><input name="biaya_sopir" id="biayaSopir" type="number" value="0" placeholder="Biaya sopir"><textarea name="catatan" placeholder="Catatan"></textarea><div class="preview">Estimasi: <b id="preview">Rp 0</b></div><button>Kirim Booking</button></form><div id="hasil"></div></section>
<script src="/js/customer.js"></script><script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js")</script></body></html>
